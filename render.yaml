services:
  # Backend Web Service
  - type: web
    name: cureon-backend
    env: python
    rootDir: backend
    buildCommand: ./render-build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cureon-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "cureon-backend.onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://cureon-frontend.s3-website-us-east-1.amazonaws.com"

  # Frontend Static Site (Optional - Alternative to S3)
  - type: static
    name: cureon-frontend
    env: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://cureon-backend.onrender.com/api/auth

databases:
  - name: cureon-db
    databaseName: cureon_db
    user: cureon_user
    plan: free
